<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#7b2ff7"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- GPU chip outline -->
  <rect x="34" y="34" width="60" height="60" rx="8" fill="none" stroke="url(#glow)" stroke-width="3"/>
  <!-- Chip pins - top -->
  <line x1="48" y1="24" x2="48" y2="34" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="24" x2="64" y2="34" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="24" x2="80" y2="34" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chip pins - bottom -->
  <line x1="48" y1="94" x2="48" y2="104" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="64" y1="94" x2="64" y2="104" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="80" y1="94" x2="80" y2="104" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chip pins - left -->
  <line x1="24" y1="48" x2="34" y2="48" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="64" x2="34" y2="64" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="24" y1="80" x2="34" y2="80" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chip pins - right -->
  <line x1="94" y1="48" x2="104" y2="48" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="94" y1="64" x2="104" y2="64" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="94" y1="80" x2="104" y2="80" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Inner chip detail - W shape for WGPU -->
  <polyline points="44,52 50,72 56,56 62,72 68,52" fill="none" stroke="#00d2ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sharp accent - # for C# -->
  <g transform="translate(72,54)" stroke="#7b2ff7" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="4" x2="12" y2="0"/>
    <line x1="0" y1="10" x2="12" y2="6"/>
    <line x1="3" y1="-2" x2="1" y2="12"/>
    <line x1="9" y1="-2" x2="7" y2="12"/>
  </g>
  <!-- Subtle grid inside chip -->
  <g opacity="0.15" stroke="#00d2ff" stroke-width="0.5">
    <line x1="34" y1="54" x2="94" y2="54"/>
    <line x1="34" y1="74" x2="94" y2="74"/>
    <line x1="54" y1="34" x2="54" y2="94"/>
    <line x1="74" y1="34" x2="74" y2="94"/>
  </g>
</svg>
